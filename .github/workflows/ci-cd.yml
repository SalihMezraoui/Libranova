name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-backend/spring-boot-library

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test -Dtest="BookServiceTest,MessageServiceTest,ReviewServiceTest,AdminServiceTest,PaymentServiceTest"

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-frontend/react-library-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 02-frontend/react-library-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: https://placeholder.railway.app/api
          REACT_APP_AUTH0_DOMAIN: placeholder.us.auth0.com
          REACT_APP_AUTH0_CLIENT_ID: placeholder_client_id
          REACT_APP_AUTH0_AUDIENCE: https://placeholder.railway.app
          REACT_APP_STRIPE_PUBLIC_KEY: pk_test_placeholder

