spring.application.name=libranova


spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/libranova_db?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# tells Hibernate which SQL dialect to use for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

# HikariCP settingsdocker compose up --build
spring.datasource.hikari.initializationFailTimeout=0
spring.datasource.hikari.connectionTimeout=30000


# Sets the base path for Spring Data REST endpoints, All REST endpoints will be prefixed with this path.
spring.data.rest.base-path=/api

# CORS configuration
frontend.url=${FRONTEND_URL}

# Auth0 configuration
# Issuer URI used by Spring to validate incoming JWTs (fetches JWKS automatically via OIDC discovery)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}

# Sets logging level for security to DEBUG, useful for debugging authentication issues.
logging.level.org.springframework.security=WARN

# Stripe API key
stripe.key.secret=${STRIPE_SECRET_KEY}


# HTTPS settings

# Server port
server.port=8443
# Enable SSL
server.ssl.enabled=true
# Alias for the key in the keystore
server.ssl.key-alias=libranova
# location of the keystore file, which contains the SSL certificate and private key
server.ssl.key-store=classpath:libranova-keystore.p12
# Password for the keystore
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# Type of the keystore, which is PKCS12 in this case used for storing the SSL certificate and private key.
server.ssl.key-store-type=PKCS12